<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B 세일즈 멀티에이전트 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#cccac0;--text:#1a1918;--text2:#6b6860;--text3:#a09e98;--blue:#1a5fa8;--blue-bg:#e8f0fb;--blue-text:#0d3d78}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:600}
.topbar p{font-size:12px;color:var(--text3);margin-top:1px}
.api-status{font-size:12px;color:#27ae60;background:#eafaf1;padding:4px 10px;border-radius:20px;border:1px solid #a9dfbf}
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.industry-bar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:1.5rem}
.industry-bar label{font-size:13px;color:var(--text2);white-space:nowrap}
.industry-bar input{flex:1;font-size:15px;font-weight:500;border:none;outline:none;background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.industry-badge{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);border:1px solid #c5d8f5;white-space:nowrap;font-weight:500}
.pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1.5rem}
.stage-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.15s;text-align:center;font-family:'Noto Sans KR',sans-serif;position:relative}
.stage-btn:hover{background:var(--surface2);border-color:var(--border2)}
.s-num{font-size:10px;color:var(--text3);font-weight:500}
.s-icon{font-size:20px}
.s-name{font-size:11px;color:var(--text);font-weight:500;line-height:1.3}
.cached-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;position:absolute;top:7px;right:7px;display:none}
.has-cache .cached-dot{display:block}
.active-1{border:2px solid #1a5fa8!important;background:#e8f0fb!important}.active-1 .s-name{color:#0d3d78}
.active-2{border:2px solid #3B6D11!important;background:#EAF3DE!important}.active-2 .s-name{color:#27500A}
.active-3{border:2px solid #854F0B!important;background:#FAEEDA!important}.active-3 .s-name{color:#633806}
.active-4{border:2px solid #993556!important;background:#FBEAF0!important}.active-4 .s-name{color:#72243E}
.active-5{border:2px solid #534AB7!important;background:#EEEDFE!important}.active-5 .s-name{color:#3C3489}
.active-6{border:2px solid #0F6E56!important;background:#E1F5EE!important}.active-6 .s-name{color:#085041}
.content-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.content-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}
.content-header-left{display:flex;align-items:center;gap:10px}
.stage-label{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.content-title{font-size:15px;font-weight:600}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-run{display:flex;align-items:center;gap:7px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s}
.btn-run:hover{background:#0d3d78}
.btn-run:disabled{background:#9ab0cc;cursor:not-allowed}
.btn-clear{padding:9px 14px;background:none;border:1px solid var(--border2);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-clear:hover{background:var(--surface2)}
.output{padding:24px;min-height:400px}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:340px;gap:12px;color:var(--text3)}
.p-icon{font-size:36px;opacity:.4}
.loading{display:flex;align-items:center;justify-content:center;min-height:340px;gap:12px;color:var(--text2);font-size:14px}
.dots{display:flex;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.cached-notice{font-size:11px;color:#27ae60;display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:7px 12px;background:#eafaf1;border-radius:6px;border:1px solid #a9dfbf}
.result{font-size:14px;line-height:1.85;color:var(--text)}
.result h3{font-size:15px;font-weight:600;margin:1.4rem 0 .5rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.result h3:first-child{margin-top:0}
.result ul{padding-left:1.4rem;margin:.4rem 0 .8rem}
.result li{margin-bottom:5px}
.result p{margin-bottom:.6rem}
.result strong{font-weight:600}
.sub-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.sub-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
.sub-btn:hover{background:var(--surface);color:var(--text);border-color:var(--blue)}
.error-box{background:#fdf2f2;border:1px solid #f5c6cb;border-radius:8px;padding:14px 16px;color:#c0392b;font-size:13px;line-height:1.7}
.error-box strong{display:block;margin-bottom:4px}
.footer{text-align:center;padding:2rem;font-size:12px;color:var(--text3)}
@media(max-width:600px){.pipeline{grid-template-columns:repeat(3,1fr)}.topbar{padding:12px 16px}.main{padding:1rem}.content-header{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>B2B 세일즈 멀티에이전트 <span style="font-size:12px;color:#27ae60;font-weight:400;">v2</span></h1>
    <p>제조장비 기본 · 전체 업종 적용 · 탭 결과 자동 저장</p>
  </div>
  <span class="api-status">● API 연결됨</span>
</div>

<div class="main">
  <div class="industry-bar">
    <label>업종</label>
    <input type="text" id="industryInput" value="제조장비" placeholder="예: 반도체 장비, SaaS, 의료기기..." oninput="updateBadge()"/>
    <span class="industry-badge" id="industryBadge">제조장비</span>
  </div>

  <div class="pipeline">
    <button class="stage-btn active-1" id="btn1" onclick="selectStage(1)"><span class="cached-dot"></span><span class="s-num">STAGE 1</span><span class="s-icon">🔍</span><span class="s-name">시장 분석</span></button>
    <button class="stage-btn" id="btn2" onclick="selectStage(2)"><span class="cached-dot"></span><span class="s-num">STAGE 2</span><span class="s-icon">🏢</span><span class="s-name">Account 발굴</span></button>
    <button class="stage-btn" id="btn3" onclick="selectStage(3)"><span class="cached-dot"></span><span class="s-num">STAGE 3</span><span class="s-icon">🎯</span><span class="s-name">LEAD 발굴</span></button>
    <button class="stage-btn" id="btn4" onclick="selectStage(4)"><span class="cached-dot"></span><span class="s-num">STAGE 4</span><span class="s-icon">🤝</span><span class="s-name">Sales Close</span></button>
    <button class="stage-btn" id="btn5" onclick="selectStage(5)"><span class="cached-dot"></span><span class="s-num">STAGE 5</span><span class="s-icon">🔧</span><span class="s-name">A/S 관리</span></button>
    <button class="stage-btn" id="btn6" onclick="selectStage(6)"><span class="cached-dot"></span><span class="s-num">STAGE 6</span><span class="s-icon">⭐</span><span class="s-name">Key Account</span></button>
  </div>

  <div class="content-wrap">
    <div class="content-header">
      <div class="content-header-left">
        <span class="stage-label" id="stageLabel" style="background:#e8f0fb;color:#0d3d78;border:1px solid #c5d8f5;">Stage 1 — 리서치 에이전트</span>
        <span class="content-title" id="contentTitle">시장 / 업종 분석</span>
      </div>
      <div class="header-actions">
        <button class="btn-clear" id="clearBtn" onclick="clearStageCache()" style="display:none">↺ 초기화</button>
        <button class="btn-run" id="runBtn" onclick="runAgent()">▶ 전략 생성</button>
      </div>
    </div>
    <div class="output" id="outputArea">
      <div class="placeholder"><div class="p-icon">🚀</div><p>업종을 확인하고 <strong>전략 생성</strong> 버튼을 클릭하세요</p></div>
    </div>
  </div>
</div>
<div class="footer">v2 · 탭 결과 자동 저장 · 답변 짤림 수정 · Sonnet 4.6</div>

<script>
// ★★★ 아래 YOUR_API_KEY_HERE 를 본인 API 키로 교체하세요 ★★★
const API_KEY = 'sk-ant-api03-fyj...iwAA';

let currentStage = 1;
const resultCache = {};

const STAGES = {
  1:{label:'Stage 1 — 리서치 에이전트',labelStyle:'background:#e8f0fb;color:#0d3d78;border:1px solid #c5d8f5;',title:'시장 / 업종 분석',subs:['글로벌 시장 상세 분석','경쟁사 심층 비교','구매 사이클 상세'],
    prompt:i=>`당신은 B2B 시장 리서치 전문가입니다. ${i} 업종을 분석해주세요.\n\n### 1. 시장 규모 및 성장률\n국내/글로벌 시장 규모와 연평균 성장률을 구체적으로 서술해주세요.\n\n### 2. 주요 트렌드 3가지\n현재 가장 중요한 시장 트렌드를 각각 상세히 분석해주세요.\n\n### 3. 경쟁사 구도\n상위 플레이어의 특징과 포지셔닝을 분석해주세요.\n\n### 4. 고객사 구매 사이클\n의사결정 구조와 구매 여정을 단계별로 설명해주세요.\n\n### 5. 세일즈 기회와 리스크\n진입 시 핵심 기회 3가지와 리스크 3가지를 구체적으로 서술해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`},
  2:{label:'Stage 2 — 탐색 에이전트',labelStyle:'background:#EAF3DE;color:#27500A;border:1px solid #b8dda0;',title:'Account 발굴 전략',subs:['LinkedIn 전략 상세','Account 스코어링 시트','전시회 공략 가이드'],
    prompt:i=>`당신은 B2B Account 탐색 전문가입니다. ${i} 업종의 신규 잠재 고객사 발굴 전략을 수립해주세요.\n\n### 1. ICP 정의\n이상적 고객 프로필(업종/규모/조건)을 구체적으로 정의해주세요.\n\n### 2. 타겟 기업 유형\n5~7개 카테고리로 타겟 기업을 분류하고 각각 특징을 서술해주세요.\n\n### 3. 발굴 채널 전략\nLinkedIn, 전시회, DB, 레퍼럴 등 채널별 전략을 상세히 서술해주세요.\n\n### 4. 월간 목표 Account 수\n채널별 현실적인 월간 목표 수치와 달성 방법을 제시해주세요.\n\n### 5. 스코어링 기준\nAccount 우선순위 판단 기준표를 점수 기준과 함께 작성해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`},
  3:{label:'Stage 3 — 영업 에이전트',labelStyle:'background:#FAEEDA;color:#633806;border:1px solid #f0c88a;',title:'LEAD / BO 발굴',subs:['이메일 시퀀스 5단계','Lead 추적 템플릿','미팅 설정 스크립트'],
    prompt:i=>`당신은 B2B 세일즈 아웃리치 전문가입니다. ${i} 업종의 신규 리드 발굴 전략을 작성해주세요.\n\n### 1. 콜드 이메일 템플릿\n제목+본문을 2가지 버전으로 실제 사용 가능하게 작성해주세요.\n\n### 2. LinkedIn 첫 접촉 메시지\n2가지 버전을 실제 사용 가능하게 작성해주세요.\n\n### 3. 전화 콜드콜 오프닝\n30초 스크립트를 상황별로 2가지 작성해주세요.\n\n### 4. Lead Scoring 기준\nHot/Warm/Cold 구분 기준을 점수표와 함께 제시해주세요.\n\n### 5. 미팅 전환율 높이는 팁\n실제 효과적인 방법 5가지를 구체적으로 서술해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`},
  4:{label:'Stage 4 — 클로징 에이전트',labelStyle:'background:#FBEAF0;color:#72243E;border:1px solid #f0b8cc;',title:'Sales Close 전략',subs:['제안서 전체 템플릿','반론 대응 카드덱','협상 체크리스트'],
    prompt:i=>`당신은 B2B 세일즈 클로징 전문가입니다. ${i} 업종 딜 클로징 전략을 작성해주세요.\n\n### 1. 제안서 구성 전략\n섹션별 핵심 메시지와 구성을 상세히 제시해주세요.\n\n### 2. 주요 반론 대응\n5가지 반론과 각각의 대응 스크립트를 실제 대화체로 작성해주세요.\n\n### 3. 협상 전술\n가격/조건/납기 협상 시 활용할 전술을 구체적으로 서술해주세요.\n\n### 4. 클로징 타이밍 신호\n구매 의사를 나타내는 신호 7가지를 제시해주세요.\n\n### 5. 계약 지연 시 Follow-up\n지연 상황별 대응 전략과 메시지 템플릿을 작성해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`},
  5:{label:'Stage 5 — CS 에이전트',labelStyle:'background:#EEEDFE;color:#3C3489;border:1px solid #c8c4f5;',title:'A/S 관리 전략',subs:['온보딩 체크리스트','NPS 설문 템플릿','Renewal 플레이북'],
    prompt:i=>`당신은 B2B 고객 성공 전문가입니다. ${i} 업종의 A/S 및 고객 관리 전략을 작성해주세요.\n\n### 1. 온보딩 플랜\n30/60/90일 단계별 실행 계획을 주차별로 상세히 작성해주세요.\n\n### 2. NPS 측정 및 개선\n측정 시점, 방법, 낮은 점수 개선 전략을 서술해주세요.\n\n### 3. 이탈 징후 조기 감지\n위험 시그널 7가지와 각각의 대응 방법을 제시해주세요.\n\n### 4. Upsell / Cross-sell\n추가 매출 기회 포착 방법, 타이밍, 접근 스크립트를 서술해주세요.\n\n### 5. 계약 갱신(Renewal) 전략\n6개월 전부터 시작하는 월별 단계별 대응 전략을 작성해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`},
  6:{label:'Stage 6 — KAM 에이전트',labelStyle:'background:#E1F5EE;color:#085041;border:1px solid #9dd8c0;',title:'Key Account 관리',subs:['KA 선별 매트릭스','QBR 슬라이드 구성','파트너십 계약 포인트'],
    prompt:i=>`당신은 Key Account Management 전문가입니다. ${i} 업종의 핵심 고객사 관리 전략을 작성해주세요.\n\n### 1. KA 선별 기준\n정량/정성 지표 기반 선별 기준을 점수표와 함께 제시해주세요.\n\n### 2. 관계 심화 로드맵\n담당자 → 임원 → 파트너십 단계별 전략과 타임라인을 서술해주세요.\n\n### 3. QBR 구성 가이드\n분기 비즈니스 리뷰 아젠다, 핵심 내용, 발표 순서를 작성해주세요.\n\n### 4. 전략적 파트너십 시나리오\n3가지 파트너십 유형과 각각의 제안 방법을 제시해주세요.\n\n### 5. KA 위험 관리\n경쟁사 방어 전략과 관계 위기 시 단계별 대응법을 서술해주세요.\n\n한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`}
};

function updateBadge(){document.getElementById('industryBadge').textContent=document.getElementById('industryInput').value||'제조장비'}

function selectStage(n){
  currentStage=n;
  for(let i=1;i<=6;i++){
    const b=document.getElementById('btn'+i);
    b.className='stage-btn'+(i===n?' active-'+i:'');
    if(resultCache[i])b.classList.add('has-cache');
  }
  const s=STAGES[n];
  document.getElementById('stageLabel').textContent=s.label;
  document.getElementById('stageLabel').style.cssText=s.labelStyle;
  document.getElementById('contentTitle').textContent=s.title;
  if(resultCache[n]){
    showResult(resultCache[n],s.subs,true);
    document.getElementById('clearBtn').style.display='block';
  } else {
    document.getElementById('clearBtn').style.display='none';
    document.getElementById('outputArea').innerHTML=`<div class="placeholder"><div class="p-icon">✨</div><p><strong>${s.title}</strong> 전략 생성 버튼을 클릭하세요</p></div>`;
  }
}

function clearStageCache(){
  delete resultCache[currentStage];
  document.getElementById('btn'+currentStage).classList.remove('has-cache');
  document.getElementById('clearBtn').style.display='none';
  const s=STAGES[currentStage];
  document.getElementById('outputArea').innerHTML=`<div class="placeholder"><div class="p-icon">✨</div><p><strong>${s.title}</strong> 전략 생성 버튼을 클릭하세요</p></div>`;
}

function parseMarkdown(t){
  return t
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,' ');
}

function showResult(text,subs,fromCache=false){
  const ind=document.getElementById('industryInput').value||'제조장비';
  const s=STAGES[currentStage];
  const notice=fromCache?`<div class="cached-notice"><span style="width:7px;height:7px;border-radius:50%;background:#27ae60;display:inline-block;flex-shrink:0"></span>저장된 결과입니다 — 재생성하려면 초기화 후 다시 클릭하세요</div>`:'';
  const subBtns=subs.map(sub=>`<button class="sub-btn" onclick="runFollowUp('${ind}','${s.title}','${sub}')">${sub} ↗</button>`).join('');
  document.getElementById('outputArea').innerHTML=`${notice}<div class="result">${parseMarkdown(text)}</div><div class="sub-actions">${subBtns}</div>`;
}

async function callAPI(prompt){
  if(API_KEY==='YOUR_API_KEY_HERE') throw new Error('API 키가 설정되지 않았습니다. 파일을 메모장으로 열어 YOUR_API_KEY_HERE를 실제 키로 교체해주세요.');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content?.[0]?.text||'응답이 없습니다.';
}

async function runAgent(){
  const industry=document.getElementById('industryInput').value.trim()||'제조장비';
  const s=STAGES[currentStage];
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='⏳ 생성 중...';
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('outputArea').innerHTML=`<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>${industry} ${s.title} 분석 중...</span></div>`;
  try{
    const text=await callAPI(s.prompt(industry));
    resultCache[currentStage]=text;
    document.getElementById('btn'+currentStage).classList.add('has-cache');
    document.getElementById('clearBtn').style.display='block';
    showResult(text,s.subs,false);
  }catch(e){
    let hint='';
    if(e.message.includes('401'))hint='<br>→ API 키를 확인해주세요.';
    if(e.message.includes('429'))hint='<br>→ 잠시 후 다시 시도해주세요.';
    if(e.message.includes('fetch'))hint='<br>→ 인터넷 연결을 확인해주세요.';
    document.getElementById('outputArea').innerHTML=`<div class="error-box"><strong>오류 발생</strong>${e.message}${hint}</div>`;
  }
  btn.disabled=false;btn.textContent='▶ 전략 생성';
}

async function runFollowUp(industry,stageName,topic){
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='⏳ 생성 중...';
  document.getElementById('outputArea').innerHTML=`<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>${topic} 상세 자료 생성 중...</span></div>`;
  try{
    const text=await callAPI(`${industry} 업종, ${stageName} 단계에서 "${topic}"에 대한 상세 자료를 작성해주세요. 실제 현장에서 바로 사용할 수 있는 구체적이고 완전한 내용으로 작성해주세요. 한국어로, 마크다운(###, -)을 사용해 구조화해주세요.`);
    const s=STAGES[currentStage];
    showResult(text,s.subs,false);
  }catch(e){
    document.getElementById('outputArea').innerHTML=`<div class="error-box"><strong>오류</strong>${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='▶ 전략 생성';
}
</script>
